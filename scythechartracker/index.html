<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunderhead Character Focus Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital@1&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            overflow-x: hidden;
        }

        .quote-font {
            font-family: 'Playfair Display', serif;
        }

        /* Custom styling for the range slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: #38bdf8;
            cursor: pointer;
            margin-top: -12px;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
            transition: transform 0.1s;
            border: 2px solid #fff;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #334155;
            border-radius: 3px;
        }
        input[type=range]:focus {
            outline: none;
        }

        /* Smooth transitions */
        .stat-bar {
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fade-transition {
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <!-- Header & Timeline Controls -->

                    <div>

                    </div>
                </div>
                <div class="bg-slate-800 px-6 py-3 rounded-xl border border-slate-700 shadow-inner text-center min-w-[250px]">

                    <span id="phase-display" class="text-sky-300 font-bold text-lg tracking-wide">The Beginning</span>
                </div>
            </div>

            <!-- The Timeline Slider -->

                    <span>2. The Hunt</span>
                    <span>3. Underworld</span>
                    <span>4. Resurgence</span>
                    <span>5. Endura</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content: Focus View -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col">
        
        <!-- Character Navigation -->
        <div class="flex justify-between items-center mb-8 bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50 backdrop-blur-sm">
            <button id="btn-prev" class="p-3 bg-slate-800 hover:bg-slate-700 text-sky-400 rounded-full transition-colors border border-slate-600 shadow-lg group">
                <i data-lucide="chevron-left" class="w-6 h-6 group-hover:-translate-x-1 transition-transform"></i>
            </button>
            
            <div class="text-center flex-grow px-4">
                <h2 id="char-name" class="text-3xl md:text-4xl font-bold text-white mb-2 transition-colors">Character Name</h2>
                <span id="char-alias" class="inline-block px-4 py-1 rounded-full text-sm font-bold tracking-widest uppercase border border-current bg-opacity-10">Alias</span>
            </div>

            <button id="btn-next" class="p-3 bg-slate-800 hover:bg-slate-700 text-sky-400 rounded-full transition-colors border border-slate-600 shadow-lg group">
                <i data-lucide="chevron-right" class="w-6 h-6 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </div>

        <!-- Two Column Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start fade-transition" id="content-container">
            
            <!-- Left Column: The Stats Bars -->
            <div class="lg:col-span-5 bg-slate-800/60 p-6 rounded-2xl border border-slate-700 shadow-xl backdrop-blur-md">
                <h3 class="text-slate-400 text-sm font-bold uppercase tracking-widest mb-6 border-b border-slate-700 pb-2">Live Metrics</h3>

                    <!-- Stat bars injected by JS -->
                </div>
            </div>

            <!-- Right Column: The Reasons & Quotes -->

                    </div>

                    <p id="phase-summary" class="text-slate-200 text-lg leading-relaxed relative z-10">
                        Summary goes here.
                    </p>
                </div>

                <!-- Why the stats are moving -->
                <div class="bg-slate-800/60 p-6 rounded-2xl border border-slate-700 shadow-xl backdrop-blur-md">
                    <h3 class="text-slate-400 text-sm font-bold uppercase tracking-widest mb-4 border-b border-slate-700 pb-2 flex items-center gap-2">
                        <i data-lucide="bar-chart-2" class="w-4 h-4"></i> Metric Analysis
                    </h3>
                    <ul id="reasons-list" class="space-y-4 text-slate-300">

                        "Quote goes here."
                    </p>
                </div>

            </div>
        </div>
    </main>

        const elStatsContainer = document.getElementById('stats-container');
        const elPhaseSummary = document.getElementById('phase-summary');
        const elReasonsList = document.getElementById('reasons-list');
        const elCharQuote = document.getElementById('char-quote');

        // Initialize Lucide icons
        lucide.createIcons();

        // --- 3. RENDER FUNCTIONS ---

        function renderCharacterBase() {
            const char = characterData[currentCharIndex];
            
            // Fade out effect
            contentContainer.style.opacity = '0';
            
            setTimeout(() => {
                // Update text colors & names
                elCharName.className = `text-3xl md:text-4xl font-bold mb-2 transition-colors ${char.textColor}`;
                elCharName.textContent = char.name;
                
                elCharAlias.className = `inline-block px-4 py-1 rounded-full text-sm font-bold tracking-widest uppercase border ${char.textColor} bg-${char.theme}-900/30`;
                elCharAlias.textContent = char.alias;

                // Build Stat Bars HTML
                let statsHtml = char.stats.map((stat, index) => `
                    <div class="mb-5">
                        <div class="flex justify-between text-xs md:text-sm font-semibold text-slate-300 mb-2">
                            <span>${stat.label}</span>
                            <span id="val-${index}" class="text-white font-bold bg-slate-900 px-2 py-0.5 rounded">0%</span>
                        </div>
                        <div class="w-full bg-slate-900 rounded-full h-3 md:h-4 shadow-inner border border-slate-700">
                            <div id="bar-${index}" class="${stat.color} h-full rounded-full stat-bar shadow-[0_0_10px_currentColor]" style="width: 0%"></div>
                        </div>
                    </div>
                `).join('');
                elStatsContainer.innerHTML = statsHtml;

                // Force an update to populate values based on current slider position
                updateUI();

                // Fade back in
                contentContainer.style.opacity = '1';
            }, 300); // Wait for fade out
        }

        function updateUI() {
            const char = characterData[currentCharIndex];
            const percentage = parseInt(slider.value, 10);
            
            // Calculate interpolation milestones
            let lowerIndex = Math.floor(percentage / 25);
            let upperIndex = Math.ceil(percentage / 25);
            if (lowerIndex === 4) { lowerIndex = 3; upperIndex = 4; }
            if (percentage === 0) { lowerIndex = 0; upperIndex = 1; }

            const lowerBoundPct = lowerIndex * 25;
            const upperBoundPct = upperIndex * 25;
            let ratio = (upperBoundPct !== lowerBoundPct) ? (percentage - lowerBoundPct) / (upperBoundPct - lowerBoundPct) : 0;

            // Nearest milestone for text data (0, 1, 2, 3, 4)
            let closestMilestone = Math.round(percentage / 25);
            
            // Update Top Header Phase Display
            phaseDisplay.textContent = phaseNames[closestMilestone];

            // Update Text Details (Snaps to phase)
            const phaseData = char.phases[closestMilestone];
            elPhaseSummary.textContent = phaseData.summary;
            elCharQuote.textContent = `"${phaseData.quote}"`;
            
            // Build Reasons List
            elReasonsList.innerHTML = phaseData.reasons.map(r => `
                <li class="flex items-start gap-3 bg-slate-900/50 p-3 rounded-lg border border-slate-700/50">
                    <div class="min-w-[4px] h-full bg-sky-500 rounded-full mt-1"></div>
                    <p class="text-sm">
                        <span class="font-bold text-slate-200 block mb-0.5">${r.label}</span> 
                        ${r.text}
                    </p>
                </li>
            `).join('');

            // Update Stat Bars (Smooth Interpolation)
            char.stats.forEach((stat, index) => {
                const lowerVal = stat.values[lowerIndex];
                const upperVal = stat.values[upperIndex];
                const currentVal = Math.round(lowerVal + ((upperVal - lowerVal) * ratio));
                
                const barEl = document.getElementById(`bar-${index}`);
                const valEl = document.getElementById(`val-${index}`);
                
                if(barEl && valEl) {
                    barEl.style.width = `${currentVal}%`;
                    valEl.textContent = `${currentVal}%`;
                }
            });
        }

        // --- 4. EVENT LISTENERS ---

        document.getElementById('btn-next').addEventListener('click', () => {
            currentCharIndex = (currentCharIndex + 1) % characterData.length;
            renderCharacterBase();
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            currentCharIndex = (currentCharIndex - 1 + characterData.length) % characterData.length;
            renderCharacterBase();
        });

        slider.addEventListener('input', updateUI);

        // Initial Boot
        renderCharacterBase();

    </script>
</body>
</html>
