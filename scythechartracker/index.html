<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunderhead Interactive Stat Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Deep slate / Thunderhead interface feel */
            color: #f8fafc;
        }

        /* Custom styling for the range slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #38bdf8;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #334155;
            border-radius: 2px;
        }
        input[type=range]:focus {
            outline: none;
        }

        /* Smooth bar transitions */
        .stat-bar {
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="antialiased min-h-screen pb-16">

    <!-- Header & Controls -->
    <header class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur border-b border-slate-700 py-6 shadow-xl">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                <div>
                    <h1 class="text-3xl font-bold text-sky-400 tracking-tight">Thunderhead Matrix</h1>
                    <p class="text-slate-400 text-sm mt-1">Interactive Character Progression</p>
                </div>
                <div class="bg-slate-800 px-6 py-2 rounded-full border border-slate-700 shadow-inner">
                    <span class="text-slate-400 text-sm font-medium mr-2">Current Phase:</span>
                    <span id="phase-display" class="text-sky-300 font-bold tracking-wide">The Beginning</span>
                </div>
            </div>

            <!-- The Timeline Slider -->
            <div class="relative w-full pt-4 pb-2">
                <input type="range" id="timeline-slider" min="0" max="100" value="0" class="w-full">
                <div class="flex justify-between text-xs text-slate-500 mt-2 px-1 font-medium">
                    <span>Start</span>
                    <span>Expulsion</span>
                    <span>The Hunt</span>
                    <span>Resurgence</span>
                    <span>Endura</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mt-10">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="character-grid">
            <!-- Cards injected by JS -->
        </div>
    </main>

    <script>
        // --- 1. DATA DEFINITION ---
        // We define 5 key milestones (0%, 25%, 50%, 75%, 100%) for smooth interpolation.
        
        const phaseNames = [
            "The Beginning", 
            "The Expulsion & The Rogue", 
            "The Underworld & Captivity", 
            "The Resurgence of the Old Guard", 
            "The Tragedy of Endura"
        ];

        const characterData = [
            {
                id: "citra",
                name: "Citra Terranova",
                alias: "Scythe Anastasia",
                theme: "sky", // color theme
                stats: [
                    { label: "Idealism", values: [90, 80, 60, 40, 10], color: "bg-sky-400" },
                    { label: "Political Danger", values: [20, 50, 90, 95, 100], color: "bg-rose-500" },
                    { label: "Influence", values: [10, 30, 60, 80, 0], color: "bg-indigo-400" }
                ],
                contexts: [
                    "Starting out as a new Scythe, hopeful to change the system from within.",
                    "Gaining attention for her compassionate methods, but angering the old guard.",
                    "Surviving assassination attempts; realizing the deep corruption runs wider than she thought.",
                    "Navigating the dangerous, high-stakes politics of the World Scythe Council.",
                    "Trapped in the sinking vault, stripped of all influence, surviving only by freezing herself."
                ]
            },
            {
                id: "rowan",
                name: "Rowan Damisch",
                alias: "Scythe Lucifer",
                theme: "rose",
                stats: [
                    { label: "Physical Threat Level", values: [100, 100, 0, 0, 0], color: "bg-rose-500" },
                    { label: "Autonomy / Freedom", values: [90, 80, 0, 0, 0], color: "bg-emerald-400" },
                    { label: "Despair", values: [10, 20, 80, 100, 95], color: "bg-purple-500" }
                ],
                contexts: [
                    "Operating as a feared, rogue vigilante hunting corrupt Scythes.",
                    "His actions cause massive political backlash, making him a primary target.",
                    "Captured, beaten, and held prisoner by Scythe Rand. His freedom is gone.",
                    "Discovers the horrifying truth of his best friend's hijacked body.",
                    "Framed for massive destruction and trapped in the Endura vault, completely helpless."
                ]
            },
            {
                id: "greyson",
                name: "Greyson Tolliver",
                alias: "Slayd Bridger",
                theme: "indigo",
                stats: [
                    { label: "Faith in Thunderhead", values: [100, 50, 10, 5, 100], color: "bg-indigo-400" },
                    { label: "Cynicism & Survival", values: [0, 20, 70, 90, 100], color: "bg-amber-400" },
                    { label: "Global Relevance", values: [0, 0, 10, 20, 100], color: "bg-teal-400" }
                ],
                contexts: [
                    "A devout student who views the Thunderhead with absolute, unquestioning reverence.",
                    "Expelled and sent undercover. His faith wavers as he navigates the unsavory world.",
                    "Feels utterly abandoned and heartbroken when the Thunderhead officially cuts him off.",
                    "Hardened by his experiences, surviving entirely on his own without guidance.",
                    "Becomes the sole prophet—the only human on Earth the Thunderhead will speak to."
                ]
            },
            {
                id: "thunderhead",
                name: "The Thunderhead",
                alias: "Global AI Entity",
                theme: "teal",
                stats: [
                    { label: "Total Control", values: [100, 90, 80, 50, 0], color: "bg-teal-400" },
                    { label: "Emotional Distress", values: [0, 20, 50, 80, 100], color: "bg-rose-400" },
                    { label: "Rule-Bending", values: [0, 40, 60, 80, 100], color: "bg-purple-400" }
                ],
                contexts: [
                    "Omniscient, benevolent, and strictly bound by its core programming.",
                    "Runs simulations predicting disaster; bends rules using Greyson as an operative.",
                    "Watches helplessly as the blind spot of the Scythedom grows wildly out of control.",
                    "Frustration peaks as it realizes humanity is steering toward the edge of a cliff.",
                    "Experiences an emotional breakdown, screams globally, and marks everyone as Unsavory."
                ]
            },
            {
                id: "goddard",
                name: "Scythe Goddard",
                alias: "Tyrant Resurrected",
                theme: "amber",
                stats: [
                    { label: "Power / Dominance", values: [0, 0, 40, 80, 100], color: "bg-amber-400" },
                    { label: "Megalomania", values: [100, 100, 100, 100, 100], color: "bg-rose-500" },
                    { label: "Vulnerability", values: [100, 80, 30, 10, 0], color: "bg-sky-400" }
                ],
                contexts: [
                    "Dead. Literally just a preserved head waiting in a secret facility.",
                    "Still dead, but preparations are quietly being made by Scythe Rand.",
                    "Resurrected in Tyger Salazar's body. Adjusting to his new physical prowess.",
                    "Manipulating politics to challenge for the High Blade position. Unstoppable momentum.",
                    "Orchestrates the sinking of Endura, destroying the old order and seizing global control."
                ]
            }
        ];

        // --- 2. RENDER INITIAL UI ---
        const grid = document.getElementById('character-grid');

        function createCharacterCard(char) {
            let statsHtml = char.stats.map((stat, index) => `
                <div class="mb-4">
                    <div class="flex justify-between text-xs font-semibold text-slate-400 mb-1">
                        <span>${stat.label}</span>
                        <span id="${char.id}-val-${index}">0%</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-2.5 shadow-inner">
                        <div id="${char.id}-bar-${index}" class="${stat.color} h-2.5 rounded-full stat-bar shadow-[0_0_8px_currentColor]" style="width: 0%"></div>
                    </div>
                </div>
            `).join('');

            return `
                <article class="bg-slate-800/50 rounded-2xl border border-slate-700 overflow-hidden flex flex-col shadow-lg backdrop-blur-sm">
                    <div class="p-5 border-b border-slate-700/50 bg-slate-800/80">
                        <div class="flex justify-between items-start mb-1">
                            <h2 class="text-xl font-bold text-slate-100">${char.name}</h2>
                        </div>
                        <span class="text-xs font-bold uppercase tracking-wider text-${char.theme}-400">${char.alias}</span>
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between gap-6">
                        <div>${statsHtml}</div>
                        <div class="bg-slate-900/80 rounded-lg p-4 border border-slate-700/50">
                            <p id="${char.id}-context" class="text-sm text-slate-300 italic leading-relaxed min-h-[4rem] flex items-center"></p>
                        </div>
                    </div>
                </article>
            `;
        }

        grid.innerHTML = characterData.map(createCharacterCard).join('');

        // --- 3. INTERPOLATION LOGIC ---
        const slider = document.getElementById('timeline-slider');
        const phaseDisplay = document.getElementById('phase-display');

        function updateUI() {
            const percentage = parseInt(slider.value, 10);
            
            // Determine which "phase" we are in based on 25% increments
            // Milestone indices: 0 (0%), 1 (25%), 2 (50%), 3 (75%), 4 (100%)
            let lowerIndex = Math.floor(percentage / 25);
            let upperIndex = Math.ceil(percentage / 25);
            
            // Edge case for exactly 100%
            if (lowerIndex === 4) { lowerIndex = 3; upperIndex = 4; }
            if (percentage === 0) { lowerIndex = 0; upperIndex = 1; }

            // Calculate how far along we are between the lower and upper bounds
            const lowerBoundPercentage = lowerIndex * 25;
            const upperBoundPercentage = upperIndex * 25;
            let ratio = 0;
            
            if (upperBoundPercentage !== lowerBoundPercentage) {
                 ratio = (percentage - lowerBoundPercentage) / (upperBoundPercentage - lowerBoundPercentage);
            }

            // Update Phase Display (based on closest milestone)
            let closestMilestone = Math.round(percentage / 25);
            phaseDisplay.textContent = phaseNames[closestMilestone];

            // Update each character
            characterData.forEach(char => {
                // Update Context Text (snaps to the closest milestone)
                const contextEl = document.getElementById(`${char.id}-context`);
                contextEl.textContent = `"${char.contexts[closestMilestone]}"`;

                // Update Stats (Smooth Interpolation)
                char.stats.forEach((stat, index) => {
                    const lowerVal = stat.values[lowerIndex];
                    const upperVal = stat.values[upperIndex];
                    
                    // Linear interpolation
                    const currentVal = Math.round(lowerVal + ((upperVal - lowerVal) * ratio));
                    
                    // Update DOM
                    const barEl = document.getElementById(`${char.id}-bar-${index}`);
                    const valEl = document.getElementById(`${char.id}-val-${index}`);
                    
                    barEl.style.width = `${currentVal}%`;
                    valEl.textContent = `${currentVal}%`;
                });
            });
        }

        // Attach event listener to slider
        slider.addEventListener('input', updateUI);

        // Run once on load to set initial state
        updateUI();
    </script>
</body>
</html>
