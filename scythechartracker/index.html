<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital@1&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            overflow-x: hidden;
        }

        .quote-font {
            font-family: 'Playfair Display', serif;
        }

        /* Custom styling for the range slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: #38bdf8;
            cursor: pointer;
            margin-top: -12px;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
            transition: transform 0.1s;
            border: 2px solid #fff;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #334155;
            border-radius: 3px;
        }
        input[type=range]:focus {
            outline: none;
        }

        /* Smooth transitions */
        .stat-bar {
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fade-transition {
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>

            </button>
            
            <div class="text-center flex-grow px-4">

            </div>

                <i data-lucide="chevron-right" class="w-6 h-6 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </div>

        <!-- Two Column Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch fade-transition" id="content-container">

                // Build Combined Stat/Reason Rows HTML
                let statsHtml = char.stats.map((stat, index) => `
                    <div class="bg-slate-900/40 p-4 rounded-xl border border-slate-700/50 flex flex-col md:flex-row gap-4 md:items-center hover:bg-slate-800/60 transition-colors">
                        <!-- Left: The Bar -->
                        <div class="w-full md:w-5/12 shrink-0">
                            <div class="flex justify-between text-xs font-bold text-slate-300 mb-2 uppercase tracking-wide">
                                <span>${stat.label}</span>
                                <span id="val-${index}" class="${stat.tColor} font-bold bg-slate-950 px-2 py-0.5 rounded shadow-inner border border-slate-800">0%</span>
                            </div>
                            <div class="w-full bg-slate-950 rounded-full h-3 shadow-inner border border-slate-800">
                                <div id="bar-${index}" class="${stat.color} h-full rounded-full stat-bar shadow-[0_0_10px_currentColor]" style="width: 0%"></div>
                            </div>
                        </div>
                        
                        <!-- Divider (Desktop) -->
                        <div class="hidden md:block w-px h-10 bg-slate-700 mx-2"></div>
                        
                        <!-- Right: The Reason -->
                        <div class="w-full md:w-7/12 text-sm text-slate-300 leading-relaxed border-l-2 md:border-l-0 border-slate-700 pl-3 md:pl-0">
                            <span id="reason-${index}">Loading reasoning...</span>
                        </div>
                    </div>
                `).join('');
                elStatsContainer.innerHTML = statsHtml;

                // Force an update to populate values based on current slider position
                updateUI();

                // Fade back in
                contentContainer.style.opacity = '1';
            }, 300); // Wait for fade out
        }

        function updateUI() {
            const char = characterData[currentCharIndex];
            const percentage = parseInt(slider.value, 10);
            
            // Calculate interpolation milestones
            let lowerIndex = Math.floor(percentage / 25);
            let upperIndex = Math.ceil(percentage / 25);
            if (lowerIndex === 4) { lowerIndex = 3; upperIndex = 4; }
            if (percentage === 0) { lowerIndex = 0; upperIndex = 1; }

            const lowerBoundPct = lowerIndex * 25;
            const upperBoundPct = upperIndex * 25;
            let ratio = (upperBoundPct !== lowerBoundPct) ? (percentage - lowerBoundPct) / (upperBoundPct - lowerBoundPct) : 0;

            // Nearest milestone for text data (0, 1, 2, 3, 4)
            let closestMilestone = Math.round(percentage / 25);
            
            // Update Top Header Phase Display with Percentage
            phaseDisplay.textContent = `${phaseNames[closestMilestone]} (${percentage}%)`;

            // Update Text Details (Snaps to phase)
            const phaseData = char.phases[closestMilestone];
            elPhaseSummary.textContent = phaseData.summary;
            elCharQuote.textContent = `"${phaseData.quote}"`;
            
            // Update Stat Bars and Reasons
            char.stats.forEach((stat, index) => {
                const lowerVal = stat.values[lowerIndex];
                const upperVal = stat.values[upperIndex];
                const currentVal = Math.round(lowerVal + ((upperVal - lowerVal) * ratio));
                
                const barEl = document.getElementById(`bar-${index}`);
                const valEl = document.getElementById(`val-${index}`);
                const reasonEl = document.getElementById(`reason-${index}`);
                
                if(barEl && valEl && reasonEl) {
                    barEl.style.width = `${currentVal}%`;
                    valEl.textContent = `${currentVal}%`;
                    
                    // Inject the matching reason text
                    reasonEl.textContent = phaseData.reasons[index];
                }
            });
        }

        // --- 4. EVENT LISTENERS ---

        document.getElementById('btn-next').addEventListener('click', () => {
            currentCharIndex = (currentCharIndex + 1) % characterData.length;
            renderCharacterBase();
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            currentCharIndex = (currentCharIndex - 1 + characterData.length) % characterData.length;
            renderCharacterBase();
        });

        slider.addEventListener('input', updateUI);

        // Initial Boot
        renderCharacterBase();

    </script>
</body>
</html>
